<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Reporting — Ragnar Apps</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --deep: #050e1a; --abyss: #071525; --ocean: #0a2540; --mid: #0e3d6e;
    --steel: #1a5f9e; --surface: #2a8fd4; --foam: #7ec8e3; --ice: #c8eaf5;
    --white: #f0f6fa; --gold: #c9a84c; --gold-light: #e8c96a;
    --text-muted: #7a9cb8; --green: #2ecc71; --amber: #f39c12; --red: #e74c3c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--deep); color:var(--white); font-family:'Barlow',sans-serif; overflow-x:hidden; }

  .ocean-bg {
    position:fixed; inset:0; z-index:0;
    background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(14,61,110,0.6) 0%, transparent 70%),
      linear-gradient(180deg, #020b14 0%, #050e1a 30%, #071525 60%, #0a1e35 100%);
    pointer-events:none;
  }
  .stars {
    position:fixed; inset:0; z-index:0;
    background-image:
      radial-gradient(1px 1px at 20% 15%, rgba(200,234,245,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 8%, rgba(200,234,245,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 25%, rgba(200,234,245,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 20%, rgba(200,234,245,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 60% 12%, rgba(200,234,245,0.6) 0%, transparent 100%);
    pointer-events:none;
  }

  /* NAV */
  nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    padding:20px 60px; display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(180deg,rgba(5,14,26,0.97) 0%,transparent 100%);
    border-bottom:1px solid rgba(42,143,212,0.1);
  }
  .nav-logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
  .nav-logo-text { font-family:'Cinzel',serif; font-size:1.1rem; font-weight:600; letter-spacing:0.15em; color:var(--white); }
  .nav-logo-text span { color:var(--gold); }
  .nav-back { font-family:'Barlow Condensed',sans-serif; font-size:0.8rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); text-decoration:none; transition:color 0.3s; }
  .nav-back:hover { color:var(--foam); }
  .nav-cta { font-family:'Barlow Condensed',sans-serif; font-size:0.8rem; letter-spacing:0.15em; text-transform:uppercase; padding:10px 24px; background:transparent; border:1px solid var(--gold); color:var(--gold); text-decoration:none; transition:all 0.3s; }
  .nav-cta:hover { background:var(--gold); color:var(--deep); }

  /* HERO */
  .page-hero { position:relative; z-index:1; padding:140px 60px 80px; text-align:center; border-bottom:1px solid rgba(42,143,212,0.1); }
  .page-badge { display:inline-block; font-family:'Barlow Condensed',sans-serif; font-size:0.7rem; letter-spacing:0.25em; text-transform:uppercase; padding:5px 16px; border:1px solid rgba(42,143,212,0.4); color:var(--foam); border-radius:2px; margin-bottom:20px; }
  .page-badge.gold { border-color:rgba(201,168,76,0.4); color:var(--gold); }
  .page-badge.coming { border-color:rgba(243,156,18,0.4); color:var(--amber); }
  .page-hero h1 { font-family:'Cinzel',serif; font-size:clamp(2.2rem,5vw,4rem); font-weight:700; letter-spacing:0.05em; margin-bottom:10px; background:linear-gradient(180deg,var(--white) 0%,var(--ice) 50%,var(--foam) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .page-hero .subtitle { font-family:'Cinzel',serif; font-size:1rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); margin-bottom:28px; }
  .page-hero p { font-size:1rem; font-weight:300; line-height:1.8; color:var(--ice); max-width:600px; margin:0 auto 36px; opacity:0.85; }
  .hero-tags { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .hero-tag { font-family:'Barlow Condensed',sans-serif; font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase; padding:5px 14px; background:rgba(42,143,212,0.08); border:1px solid rgba(42,143,212,0.25); color:var(--foam); }

  /* SECTIONS */
  .section { position:relative; z-index:1; padding:80px 60px; max-width:1200px; margin:0 auto; }
  .section-tag { font-family:'Barlow Condensed',sans-serif; font-size:0.7rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); margin-bottom:14px; display:flex; align-items:center; gap:12px; }
  .section-tag::before { content:''; width:28px; height:1px; background:var(--gold); }
  .section h2 { font-family:'Cinzel',serif; font-size:clamp(1.5rem,3vw,2.2rem); color:var(--white); margin-bottom:12px; line-height:1.2; }
  .section p.lead { font-size:0.95rem; color:var(--text-muted); line-height:1.8; max-width:680px; margin-bottom:40px; font-weight:300; }
  .section-divider { position:relative; z-index:1; border:none; border-top:1px solid rgba(42,143,212,0.1); }

  /* SCREEN MOCKUP */
  .screen-wrap { background:rgba(7,21,37,0.8); border:1px solid rgba(42,143,212,0.25); border-radius:8px; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,0.4); }
  .screen-bar { background:rgba(14,61,110,0.4); border-bottom:1px solid rgba(42,143,212,0.2); padding:10px 16px; display:flex; align-items:center; gap:8px; }
  .screen-dot { width:9px; height:9px; border-radius:50%; }
  .screen-dot.r { background:rgba(220,50,50,0.7); } .screen-dot.a { background:rgba(245,127,23,0.7); } .screen-dot.g { background:rgba(46,180,50,0.7); }
  .screen-url { font-family:'Barlow Condensed',sans-serif; font-size:0.68rem; letter-spacing:0.08em; color:var(--text-muted); background:rgba(5,14,26,0.6); border:1px solid rgba(42,143,212,0.15); border-radius:3px; padding:3px 12px; margin-left:8px; }
  .screen-body { padding:20px; background:rgba(5,14,26,0.5); }

  /* FORM ELEMENTS */
  .fm-card { background:rgba(7,21,37,0.7); border:1px solid rgba(42,143,212,0.2); border-radius:6px; padding:14px 16px; margin-bottom:12px; }
  .fm-title { font-family:'Barlow Condensed',sans-serif; font-size:0.68rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--foam); margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid rgba(42,143,212,0.15); }
  .fm-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .fm-grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .fm-field label { font-size:0.58rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.1em; display:block; margin-bottom:3px; }
  .fm-input { height:28px; background:rgba(5,14,26,0.5); border:1px solid rgba(42,143,212,0.2); border-radius:3px; padding:0 8px; display:flex; align-items:center; }
  .fm-input span { font-size:0.72rem; color:var(--text-muted); }
  .fm-input.filled span { color:var(--white); }
  .fm-input.highlight { border-color:rgba(46,204,113,0.4); background:rgba(46,204,113,0.06); }
  .fm-input.highlight span { color:var(--green); font-weight:600; }

  /* TIMERS */
  .timer-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .timer-card { background:rgba(7,21,37,0.7); border:1px solid rgba(42,143,212,0.2); border-radius:6px; padding:12px; }
  .timer-card.active { border-color:rgba(42,143,212,0.5); background:rgba(10,37,64,0.7); }
  .timer-name { font-size:0.62rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:6px; }
  .timer-btn { width:100%; padding:6px; border-radius:4px; font-family:'Barlow Condensed',sans-serif; font-size:0.68rem; letter-spacing:0.08em; text-align:center; margin-bottom:8px; border:1px solid; cursor:default; }
  .timer-btn.out { background:rgba(42,143,212,0.15); border-color:rgba(42,143,212,0.4); color:var(--foam); }
  .timer-btn.standby { background:rgba(5,14,26,0.5); border-color:rgba(42,143,212,0.15); color:var(--text-muted); }
  .timer-time { font-family:'JetBrains Mono',monospace; font-size:1.1rem; font-weight:600; color:var(--white); }
  .timer-card.active .timer-time { color:var(--surface); }
  .active-dot { width:6px; height:6px; border-radius:50%; background:var(--surface); display:inline-block; margin-right:5px; animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  .depth-row { display:flex; gap:4px; margin-top:6px; }
  .depth-box { flex:1; background:rgba(5,14,26,0.5); border:1px solid rgba(42,143,212,0.15); border-radius:3px; padding:3px 4px; text-align:center; }
  .depth-box label { font-size:0.5rem; color:var(--text-muted); display:block; }
  .depth-box span { font-family:'JetBrains Mono',monospace; font-size:0.68rem; color:var(--white); }

  /* TASK LOG */
  .task-log { background:rgba(7,21,37,0.7); border:1px solid rgba(42,143,212,0.2); border-radius:6px; overflow:hidden; }
  .task-row { display:flex; align-items:center; gap:10px; padding:8px 14px; border-bottom:1px solid rgba(42,143,212,0.1); }
  .task-row:last-child { border-bottom:none; }
  .task-time { font-family:'JetBrains Mono',monospace; font-size:0.65rem; color:var(--text-muted); width:52px; flex-shrink:0; }
  .task-action { font-size:0.78rem; color:var(--ice); flex:1; }
  .task-badge { font-size:0.58rem; padding:2px 7px; border-radius:2px; font-family:'Barlow Condensed',sans-serif; letter-spacing:0.05em; border:1px solid; }
  .task-badge.green { background:rgba(46,204,113,0.1); border-color:rgba(46,204,113,0.3); color:var(--green); }
  .task-badge.blue { background:rgba(42,143,212,0.1); border-color:rgba(42,143,212,0.3); color:var(--foam); }
  .task-badge.amber { background:rgba(243,156,18,0.1); border-color:rgba(243,156,18,0.3); color:var(--amber); }

  /* RECORDS TABLE */
  .records-wrap { background:rgba(7,21,37,0.7); border:1px solid rgba(42,143,212,0.2); border-radius:6px; overflow:hidden; }
  .records-toolbar { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid rgba(42,143,212,0.15); background:rgba(14,61,110,0.3); }
  .records-title { font-family:'Cinzel',serif; font-size:0.9rem; color:var(--white); }
  .records-btn { font-family:'Barlow Condensed',sans-serif; font-size:0.65rem; letter-spacing:0.1em; text-transform:uppercase; padding:5px 12px; border:1px solid rgba(42,143,212,0.3); border-radius:3px; color:var(--text-muted); background:transparent; cursor:pointer; }
  .rec-table { width:100%; border-collapse:collapse; font-size:0.78rem; }
  .rec-table th { background:rgba(14,61,110,0.2); padding:8px 14px; text-align:left; font-family:'Barlow Condensed',sans-serif; font-size:0.62rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); border-bottom:1px solid rgba(42,143,212,0.15); }
  .rec-table td { padding:10px 14px; border-bottom:1px solid rgba(42,143,212,0.08); color:var(--ice); }
  .rec-table tr:last-child td { border-bottom:none; }
  .rec-table tr:hover td { background:rgba(42,143,212,0.05); }
  .rec-badge { display:inline-flex; align-items:center; font-size:0.62rem; padding:2px 8px; border-radius:2px; font-family:'Barlow Condensed',sans-serif; letter-spacing:0.05em; border:1px solid; margin-right:4px; }
  .rec-badge.bell { background:rgba(42,143,212,0.1); border-color:rgba(42,143,212,0.3); color:var(--foam); }
  .rec-badge.ht { background:rgba(243,156,18,0.1); border-color:rgba(243,156,18,0.3); color:var(--amber); }
  .expand-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:12px 14px; background:rgba(5,14,26,0.5); }
  .expand-cell { background:rgba(7,21,37,0.7); border:1px solid rgba(42,143,212,0.15); border-radius:4px; padding:6px 8px; }
  .expand-cell label { font-size:0.56rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; display:block; }
  .expand-cell span { font-size:0.78rem; color:var(--white); font-weight:500; }
  .dl-btn { display:inline-flex; align-items:center; gap:6px; font-family:'Barlow Condensed',sans-serif; font-size:0.65rem; letter-spacing:0.08em; text-transform:uppercase; padding:5px 12px; border:1px solid rgba(42,143,212,0.3); border-radius:3px; color:var(--foam); background:transparent; margin:8px 14px 12px; cursor:pointer; }

  /* PDF */
  .pdf-wrap { background:#F8FAFC; border-radius:8px; overflow:hidden; max-width:680px; margin:0 auto; box-shadow:0 8px 40px rgba(0,0,0,0.5); }
  .pdf-page { padding:24px 28px; }
  .pdf-header { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; margin-bottom:16px; padding-bottom:12px; border-bottom:2px solid #1B3A6B; }
  .pdf-logo-block { display:flex; flex-direction:column; gap:4px; }
  .pdf-logo-bar { height:6px; border-radius:2px; }
  .pdf-logo-bar.b1 { width:70px; background:#2563A8; opacity:0.5; }
  .pdf-logo-bar.b2 { width:48px; background:#1B3A6B; opacity:0.4; }
  .pdf-center { text-align:center; }
  .pdf-center h3 { font-family:'Cinzel',serif; font-size:0.95rem; color:#1B3A6B; }
  .pdf-center p { font-size:0.62rem; color:#64748B; }
  .pdf-run { font-family:'JetBrains Mono',monospace; font-size:1.4rem; font-weight:700; color:#1B3A6B; text-align:right; }
  .pdf-run-lbl { font-size:0.55rem; color:#64748B; text-transform:uppercase; letter-spacing:0.1em; text-align:right; }
  .pdf-stitle { font-family:'Barlow Condensed',sans-serif; font-size:0.62rem; letter-spacing:0.15em; text-transform:uppercase; color:#1B3A6B; background:#EFF6FF; padding:3px 8px; border-left:3px solid #2563A8; margin:10px 0 6px; }
  .pdf-grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-bottom:6px; }
  .pdf-cell { border:1px solid #E2E8F0; padding:4px 7px; }
  .pdf-cell label { font-size:0.52rem; color:#64748B; text-transform:uppercase; letter-spacing:0.06em; display:block; }
  .pdf-cell span { font-size:0.72rem; color:#1E293B; font-weight:500; }
  .pdf-tasks { width:100%; border-collapse:collapse; font-size:0.65rem; }
  .pdf-tasks th { background:#F1F5F9; padding:4px 8px; text-align:left; font-family:'Barlow Condensed',sans-serif; font-size:0.58rem; letter-spacing:0.1em; text-transform:uppercase; color:#64748B; border:1px solid #E2E8F0; }
  .pdf-tasks td { padding:3px 8px; border:1px solid #E2E8F0; color:#1E293B; }
  .pdf-footer { text-align:center; font-size:0.58rem; color:#94A3B8; border-top:1px solid #E2E8F0; padding-top:8px; margin-top:14px; font-style:italic; }

  /* ANALYTICS */
  .analytics-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:28px; }
  .analytics-grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:28px; }
  .analytics-grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:28px; }
  .metric-card { background:rgba(7,21,37,0.7); border:1px solid rgba(42,143,212,0.2); border-radius:6px; padding:16px; display:flex; justify-content:space-between; align-items:flex-start; }
  .metric-label { font-family:'Barlow Condensed',sans-serif; font-size:0.62rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px; }
  .metric-value { font-family:'JetBrains Mono',monospace; font-size:1.4rem; font-weight:700; color:var(--white); }
  .metric-icon { background:rgba(42,143,212,0.15); border:1px solid rgba(42,143,212,0.2); border-radius:6px; padding:8px; }

  /* DECO */
  .deco-block { background:rgba(7,21,37,0.7); border:1px solid rgba(42,143,212,0.2); border-radius:6px; overflow:hidden; }
  .deco-header { background:rgba(14,61,110,0.3); border-bottom:1px solid rgba(42,143,212,0.15); padding:10px 14px; display:flex; justify-content:space-between; align-items:center; }
  .deco-h-title { font-family:'Barlow Condensed',sans-serif; font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--foam); }
  .deco-h-sub { font-size:0.62rem; color:var(--text-muted); }
  .deco-disclaimer { background:rgba(243,156,18,0.08); border-bottom:1px solid rgba(243,156,18,0.2); padding:5px 14px; font-size:0.62rem; color:var(--amber); }
  .deco-table { width:100%; border-collapse:collapse; }
  .deco-table th { background:rgba(14,61,110,0.2); padding:7px 14px; text-align:left; font-family:'Barlow Condensed',sans-serif; font-size:0.62rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); border-bottom:1px solid rgba(42,143,212,0.15); }
  .deco-table td { padding:8px 14px; border-bottom:1px solid rgba(42,143,212,0.08); font-size:0.78rem; color:var(--ice); }
  .deco-table tr.active-deco td { background:rgba(46,204,113,0.08); color:var(--green); font-weight:600; border-left:3px solid var(--green); }
  .deco-table tr.next-deco td { background:rgba(42,143,212,0.06); color:var(--foam); }
  .deco-table tr.past-deco td { color:var(--text-muted); opacity:0.5; }
  .deco-dbadge { font-size:0.58rem; padding:2px 7px; border-radius:2px; font-family:'Barlow Condensed',sans-serif; border:1px solid; }
  .deco-dbadge.cur { background:rgba(46,204,113,0.1); border-color:rgba(46,204,113,0.3); color:var(--green); }
  .deco-dbadge.nxt { background:rgba(42,143,212,0.1); border-color:rgba(42,143,212,0.3); color:var(--foam); }
  .deco-dbadge.done { background:transparent; border-color:rgba(122,156,184,0.2); color:var(--text-muted); }

  /* SURDO2 */
  .surdo2-chart { display:flex; height:90px; background:rgba(5,14,26,0.5); border:1px solid rgba(42,143,212,0.15); border-radius:5px; overflow:hidden; align-items:flex-end; }
  .seg-compress { width:28px; background:linear-gradient(to bottom,transparent,rgba(122,156,184,0.5)); }
  .seg-o2 { background:rgba(46,204,113,0.35); border-left:1px solid rgba(46,204,113,0.3); border-right:1px solid rgba(46,204,113,0.3); display:flex; align-items:center; justify-content:center; }
  .seg-o2 span { font-family:'Barlow Condensed',sans-serif; font-size:0.58rem; letter-spacing:0.05em; color:var(--green); }
  .seg-airbrk { background:rgba(243,156,18,0.25); border-left:1px solid rgba(243,156,18,0.3); border-right:1px solid rgba(243,156,18,0.3); display:flex; align-items:center; justify-content:center; }
  .seg-airbrk span { font-size:0.52rem; color:var(--amber); writing-mode:vertical-rl; transform:rotate(180deg); }
  .seg-ascent { width:28px; background:linear-gradient(to top,transparent,rgba(42,143,212,0.5)); }
  .chart-labels { display:flex; justify-content:space-between; font-size:0.58rem; color:var(--text-muted); padding:4px 0; }
  .chart-legend { display:flex; gap:14px; margin-top:6px; }
  .legend-item { display:flex; align-items:center; gap:5px; font-size:0.62rem; color:var(--text-muted); }
  .legend-dot { width:10px; height:10px; border-radius:2px; }

  /* FEATURES */
  .features-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:22px; }
  .feat-item { display:flex; gap:14px; align-items:flex-start; }
  .feat-icon { width:38px; height:38px; background:rgba(42,143,212,0.1); border:1px solid rgba(42,143,212,0.2); border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .feat-text h4 { font-size:0.88rem; font-weight:600; color:var(--white); margin-bottom:4px; }
  .feat-text p { font-size:0.78rem; color:var(--text-muted); line-height:1.6; }

  /* CTA */
  .cta-section { position:relative; z-index:1; padding:80px 60px; text-align:center; border-top:1px solid rgba(42,143,212,0.1); }
  .cta-section h2 { font-family:'Cinzel',serif; font-size:2rem; color:var(--white); margin-bottom:12px; }
  .cta-section p { color:var(--text-muted); margin-bottom:32px; font-size:0.95rem; }
  .cta-btn { display:inline-block; font-family:'Barlow Condensed',sans-serif; font-size:0.88rem; letter-spacing:0.18em; text-transform:uppercase; padding:14px 44px; background:transparent; border:1px solid var(--gold); color:var(--gold); text-decoration:none; transition:all 0.3s; }
  .cta-btn:hover { background:var(--gold); color:var(--deep); }
